name: Pipeline EC2 Pull Source & Run Docker (Root)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'develop'
        type: choice
        options:
          - develop
          - feature/merge
          - feature/pipeline
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production

env:
  NODE_VERSION: '20.x'
  PROJECT_DIR: '/projects/dozu-api-service'

jobs:
  check-connection:
    name: Check EC2 Connection
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Check connection to EC2 and root access
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "echo 'Connection successful!' && echo 'Checking sudo access:' && sudo -n echo 'Sudo access confirmed'"

      - name: Verify project directory exists with root
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "sudo test -d ${{ env.PROJECT_DIR }} && echo 'Project directory exists' || echo 'Project directory does not exist'"

  deploy-application:
    name: Deploy Application to EC2
    needs: check-connection
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment script
        run: |
          cat > deploy.sh << 'EOL'
          #!/bin/bash
          set -e

          PROJECT_DIR="$1"
          BRANCH="$2"
          ENV="$3"

          # Become root
          sudo -s << EOF

          # Create project directory if it doesn't exist
          mkdir -p "$PROJECT_DIR"
          cd "$PROJECT_DIR" || { echo "Failed to change directory to $PROJECT_DIR"; exit 1; }

          # Set proper ownership
          chown -R $(whoami):$(whoami) "$PROJECT_DIR"

          # Check if the directory is a Git repository
          if [ -d .git ]; then
            echo "Git repository exists, fetching latest changes"
            git fetch --all
            
            # Check if the branch exists locally
            if git rev-parse --verify "$BRANCH" >/dev/null 2>&1; then
              echo "Checking out existing branch: $BRANCH"
              git checkout "$BRANCH"
            else
              echo "Creating new tracking branch for: $BRANCH"
              git checkout -b "$BRANCH" "origin/$BRANCH"
            fi
            
            echo "Pulling latest code from branch: $BRANCH"
            git pull origin "$BRANCH"
          else
            echo "Directory is not a Git repository, initializing..."
            # If not a Git repo, initialize and clone
            rm -rf * .[!.]* ..?*
            git init
            git remote add origin https://github.com/your-org/dozu-api-service.git
            git fetch --all
            git checkout -b "$BRANCH" "origin/$BRANCH"
          fi

          # Set up environment variables for docker-compose
          echo "Setting up environment variables for $ENV environment"
          if [ "$ENV" = "production" ]; then
            cp .env.production .env || echo "Warning: No .env.production file found"
          else
            cp .env.development .env || echo "Warning: No .env.development file found"
          fi

          # Ensure Docker is running
          systemctl status docker > /dev/null || systemctl start docker


          # Build and run Docker containers
          echo "Building and starting Docker containers"
          docker-compose build api
          docker-compose up -d api

          # Check container status
          echo "Container status:"
          docker-compose ps

          # Check logs for errors
          echo "Container logs (last 20 lines):"
          docker-compose logs --tail=20

          echo "Deployment completed successfully!"
          EOF
          EOL

          chmod +x deploy.sh

      - name: Transfer deployment script to EC2
        run: |
          scp deploy.sh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/deploy.sh

      - name: Execute deployment script on EC2
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "~/deploy.sh '${{ env.PROJECT_DIR }}' '${{ github.event.inputs.branch }}' '${{ github.event.inputs.environment }}'"

      - name: Verify deployment
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "sudo docker ps | grep dozu-api"

      - name: Clean up
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "rm ~/deploy.sh"
