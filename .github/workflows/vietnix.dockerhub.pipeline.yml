name: VIETNIX CI/CD Pipeline

on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Branch to deploy'
                required: true
                default: 'feature/merge'
                type: choice
                options:
                    - develop
                    - feature/merge
                    - feature/pipeline
            environment:
                description: 'Environment to deploy to'
                required: true
                default: 'production'
                type: choice
                options:
                    - development
                    - production

env:
    NODE_VERSION: '22.x'
    PROJECT_DIR: '/projects/dozu-api-service'

jobs:
    check-connection:
        name: Check SSH Connection
        runs-on: ubuntu-latest
        steps:
            - name: Install sshpass
              run: |
                  sudo apt-get update
                  sudo apt-get install -y sshpass
            - name: Check SSH and sudo access
              env:
                  HOST: ${{ secrets.VIETNIX_HOST }}
                  USERNAME: ${{ secrets.VIETNIX_USERNAME }}
                  PASSWORD: ${{ secrets.VIETNIX_PASSWORD }}
              run: |
                  set -e
                  sshpass -p "$PASSWORD" ssh -p 8622 -o StrictHostKeyChecking=no "$USERNAME@$HOST" "echo 'VIETNIX connection OK'; \
                    echo 'Checking sudo access (may prompt internally)...'; \
                    echo \"$PASSWORD\" | sudo -S -p '' echo 'Sudo access confirmed' || echo 'Sudo access not required or failed'"
    build-source:
        name: Build Source
        runs-on: ubuntu-latest
        needs: check-connection
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.branch }}

            - name: Use Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            # - name: Run tests
            #   run: |
            #       if [ -f package.json ] && jq -e '.scripts.test' package.json >/dev/null 2>&1; then
            #         npm test --if-present
            #       else
            #         echo "No test script"
            #       fi

            - name: Build
              run: |
                  if [ -f package.json ] && jq -e '.scripts.build' package.json >/dev/null 2>&1; then
                    npm run build
                  else
                    echo "No build script defined. Failing because build must succeed."
                    exit 1
                  fi
    build-push:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        needs: build-source
        outputs:
            # Use base64-encoded outputs to avoid masking by GitHub runner
            image_b64: ${{ steps.meta.outputs.image_b64 }}
            tag_b64: ${{ steps.meta.outputs.tag_b64 }}
            env_file: ${{ steps.envfile.outputs.env_file }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.branch }}

            - name: Derive image name and tag
              id: meta
              env:
                  BRANCH_INPUT: ${{ github.event.inputs.branch }}
                  ENV_INPUT: ${{ github.event.inputs.environment }}
              run: |
                  set -euo pipefail
                  USER_LC="$(printf '%s' '${{ secrets.DOCKERHUB_USERNAME }}' | tr '[:upper:]' '[:lower:]')"
                  IMAGE="$USER_LC/dozu-api-service"
                  BRANCH_TAG="${BRANCH_INPUT//\//-}"
                  SHORT_SHA="${GITHUB_SHA::7}"
                  TAG="${ENV_INPUT}-${BRANCH_TAG}-${SHORT_SHA}"
                  # Emit base64 to bypass output masking
                  echo "image_b64=$(printf '%s' "$IMAGE" | base64 -w0)" >> "$GITHUB_OUTPUT"
                  echo "tag_b64=$(printf '%s' "$TAG" | base64 -w0)" >> "$GITHUB_OUTPUT"

            - name: Create ENV file for build
              id: envfile
              env:
                  ENV_INPUT: ${{ github.event.inputs.environment }}
                  PORT: ${{ secrets.PORT }}
                  HOST: ${{ secrets.HOST }}
                  NODE_ENV: ${{ secrets.NODE_ENV }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  DATABASE_URL_DRIZZLE_MIGRATE: ${{ secrets.DATABASE_URL_DRIZZLE_MIGRATE }}
                  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
                  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
                  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  GOOGLE_STUDIO_API_KEY: ${{ secrets.GOOGLE_STUDIO_API_KEY }}
                  REDIS_HOST: ${{ secrets.REDIS_HOST }}
                  REDIS_PORT: ${{ secrets.REDIS_PORT }}
                  REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
                  REDIS_DB: ${{ secrets.REDIS_DB }}
                  REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
                  REDIS_PUBSUB_HOST: ${{ secrets.REDIS_PUBSUB_HOST }}
                  REDIS_PUBSUB_PORT: ${{ secrets.REDIS_PUBSUB_PORT }}
                  REDIS_PUBSUB_PASSWORD: ${{ secrets.REDIS_PUBSUB_PASSWORD }}
                  REDIS_PUBSUB_DB: ${{ secrets.REDIS_PUBSUB_DB }}
                  AWS_REGION: ${{ secrets.AWS_REGION }}
                  ACCESS_KEY_ID_AWS: ${{ secrets.ACCESS_KEY_ID_AWS }}
                  SECRET_ACCESS_KEY_AWS: ${{ secrets.SECRET_ACCESS_KEY_AWS }}
                  FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}
                  BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
                  MAIL_HOST: ${{ secrets.MAIL_HOST }}
                  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
                  MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
                  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
                  CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
                  CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
                  CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
                  PAY_OS_CLIENT_ID: ${{ secrets.PAY_OS_CLIENT_ID }}
                  PAY_OS_API_KEY: ${{ secrets.PAY_OS_API_KEY }}
                  PAY_OS_CHECKSUM_KEY: ${{ secrets.PAY_OS_CHECKSUM_KEY }}
                  CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
                  CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
                  CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
                  CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
                  UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
                  ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
              run: |
                  set -euo pipefail
                  if [ "$ENV_INPUT" = "production" ]; then
                    ENV_FILE=".env.production"
                  else
                    ENV_FILE=".env.development"
                  fi
                  {
                    echo "PORT=$PORT"
                    echo "HOST=$HOST"
                    echo "NODE_ENV=$NODE_ENV"
                    echo "DATABASE_URL=$DATABASE_URL"
                    echo "DATABASE_URL_DRIZZLE_MIGRATE=$DATABASE_URL_DRIZZLE_MIGRATE"
                    echo "POSTGRES_DB=$POSTGRES_DB"
                    echo "POSTGRES_USER=$POSTGRES_USER"
                    echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD"
                    echo "OPENAI_API_KEY=$OPENAI_API_KEY"
                    echo "GOOGLE_STUDIO_API_KEY=$GOOGLE_STUDIO_API_KEY"
                    echo "REDIS_HOST=$REDIS_HOST"
                    echo "REDIS_PORT=$REDIS_PORT"
                    echo "REDIS_PASSWORD=$REDIS_PASSWORD"
                    echo "REDIS_DB=$REDIS_DB"
                    echo "REDIS_USERNAME=$REDIS_USERNAME"
                    echo "REDIS_PUBSUB_HOST=$REDIS_PUBSUB_HOST"
                    echo "REDIS_PUBSUB_PORT=$REDIS_PUBSUB_PORT"
                    echo "REDIS_PUBSUB_PASSWORD=$REDIS_PUBSUB_PASSWORD"
                    echo "REDIS_PUBSUB_DB=$REDIS_PUBSUB_DB"
                    echo "AWS_REGION=$AWS_REGION"
                    echo "ACCESS_KEY_ID_AWS=$ACCESS_KEY_ID_AWS"
                    echo "SECRET_ACCESS_KEY_AWS=$SECRET_ACCESS_KEY_AWS"
                    echo "FRONTEND_BASE_URL=$FRONTEND_BASE_URL"
                    echo "BACKEND_BASE_URL=$BACKEND_BASE_URL"
                    echo "MAIL_HOST=$MAIL_HOST"
                    echo "MAIL_USERNAME=$MAIL_USERNAME"
                    echo "MAIL_APP_PASSWORD=$MAIL_APP_PASSWORD"
                    echo "JWT_SECRET=$JWT_SECRET"
                    echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"
                    echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET"
                    echo "CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME"
                    echo "CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY"
                    echo "CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET"
                    echo "PAY_OS_CLIENT_ID=$PAY_OS_CLIENT_ID"
                    echo "PAY_OS_API_KEY=$PAY_OS_API_KEY"
                    echo "PAY_OS_CHECKSUM_KEY=$PAY_OS_CHECKSUM_KEY"
                    echo "CLOUDFLARE_R2_ACCOUNT_ID=$CLOUDFLARE_R2_ACCOUNT_ID"
                    echo "CLOUDFLARE_R2_BUCKET_NAME=$CLOUDFLARE_R2_BUCKET_NAME"
                    echo "CLOUDFLARE_R2_ACCESS_KEY_ID=$CLOUDFLARE_R2_ACCESS_KEY_ID"
                    echo "CLOUDFLARE_R2_SECRET_ACCESS_KEY=$CLOUDFLARE_R2_SECRET_ACCESS_KEY"
                    echo "UNSPLASH_ACCESS_KEY=$UNSPLASH_ACCESS_KEY"
                    echo "ALLOWED_ORIGINS=$ALLOWED_ORIGINS"
                  } > "$ENV_FILE"
                  echo "env_file=$ENV_FILE" >> "$GITHUB_OUTPUT"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push
              env:
                  ENV_FILE: ${{ steps.envfile.outputs.env_file }}
              run: |
                  set -euo pipefail
                  IMAGE="$(printf '%s' '${{ steps.meta.outputs.image_b64 }}' | base64 -d)"
                  TAG="$(printf '%s' '${{ steps.meta.outputs.tag_b64 }}' | base64 -d)"
                  docker buildx build \
                    --platform linux/amd64 \
                    --build-arg ENV_FILE="$ENV_FILE" \
                    -t "$IMAGE:$TAG" \
                    -f Dockerfile \
                    --push .

    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        needs: build-push
        steps:
            - name: Install sshpass
              run: |
                  sudo apt-get update
                  sudo apt-get install -y sshpass

            - name: Pull image and restart container
              env:
                  ENV_FILE: ${{ steps.envfile.outputs.env_file }}
                  HOST: ${{ secrets.VIETNIX_HOST }}
                  USERNAME: ${{ secrets.VIETNIX_USERNAME }}
                  PASSWORD: ${{ secrets.VIETNIX_PASSWORD }}
                  DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
                  DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
              run: |
                  set -e
                  IMAGE="$(printf '%s' '${{ needs.build-push.outputs.image_b64 }}' | base64 -d)"
                  TAG="$(printf '%s' '${{ needs.build-push.outputs.tag_b64 }}' | base64 -d)"
                  # Fallback in case outputs were masked/empty
                  if [ -z "$IMAGE" ]; then IMAGE="$(printf '%s' "$DOCKER_USER" | tr '[:upper:]' '[:lower:]')/dozu-api-service"; fi
                  if [ -z "$TAG" ]; then
                    BRANCH_INPUT='${{ github.event.inputs.branch }}'
                    ENV_INPUT='${{ github.event.inputs.environment }}'
                    BRANCH_TAG="${BRANCH_INPUT//\//-}"
                    SHORT_SHA="${GITHUB_SHA::7}"
                    TAG="${ENV_INPUT}-${BRANCH_TAG}-${SHORT_SHA}"
                  fi

                  REMOTE_CMDS=$(cat <<'BASH'
                  set -e

                  # Define variables
                  CONTAINER_NAME="api-service"
                  NETWORK_NAME="dozu-app-network"
                  CONTAINER_PORT="3444"
                  HOST_PORT="3444"
                  VOLUME_NAME="api-logs"
                  VOLUME_PATH="/app/logs"

                  # login to Docker Hub
                  if command -v docker >/dev/null 2>&1; then
                    echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USER" --password-stdin || true
                  fi
                  # pull latest image
                  docker pull "$IMAGE:$TAG" || { echo "docker pull failed"; exit 1; }
                  # stop and remove existing container if exists
                  if [ "$(docker ps -aq -f name=api-service)" ]; then
                    docker stop api-service || true
                    docker rm api-service || true
                  fi
                  # run container
                  docker run -d \
                    --name "$CONTAINER_NAME"  \
                    --restart always \
                    --network "$NETWORK_NAME" \
                    -e NODE_ENV=production \
                    -p "$HOST_PORT:$CONTAINER_PORT" \
                    -v "$VOLUME_NAME:$VOLUME_PATH" \
                    "$IMAGE:$TAG"
                  # cleanup unused images
                  docker image prune -a -f
                  docker ps
                  BASH
                  )

                  # run remote with sudo and pass env vars explicitly
                  sshpass -p "$PASSWORD" ssh -p 8622 -o StrictHostKeyChecking=no "$USERNAME@$HOST" "command -v docker >/dev/null 2>&1 || { echo 'Docker is not installed on remote'; exit 1; }; echo \"$PASSWORD\" | sudo -S -p '' env DOCKER_USER='$DOCKER_USER' DOCKER_TOKEN='$DOCKER_TOKEN' IMAGE='$IMAGE' TAG='$TAG' bash -lc '$REMOTE_CMDS'"
