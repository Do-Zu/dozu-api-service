name: AWS EC2 CI/CD Pipeline

on:
  #   pull_request:
  #     types: [closed]
  #     branches: [develop, feature/merge, feature/pipeline]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'develop'
        type: choice
        options:
          - develop
          - feature/merge
          - feature/pipeline
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production

env:
  NODE_VERSION: '20.x'
  ECR_REPOSITORY: dozu-api-service
  AWS_REGION: us-east-1

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Compiler Check
        run: npm run typecheck

      - name: Create Environment Files
        run: |
          if [[ "${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'development') }}" == "production" ]]; then
            echo "Setting up production environment"
            cp .env.production .env
          else
            echo "Setting up development environment"
            cp .env.development .env
          fi

  deploy-to-ec2:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'development') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Setup Environment Variables File
        run: |
          cat > .env << EOF
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          EOF

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          APP_DIR: /home/${{ secrets.EC2_USERNAME }}/dozu-api
        run: |
          # Create app directory if not exists
          ssh $EC2_USERNAME@$EC2_HOST "mkdir -p $APP_DIR"

          # Transfer necessary files to EC2
          scp -r docker-compose.yml Dockerfile .env $EC2_USERNAME@$EC2_HOST:$APP_DIR/
          scp -r .env.production .env.development $EC2_USERNAME@$EC2_HOST:$APP_DIR/
          scp -r src package*.json tsconfig.json $EC2_USERNAME@$EC2_HOST:$APP_DIR/
          scp -r init-scripts $EC2_USERNAME@$EC2_HOST:$APP_DIR/

          # Connect to EC2 and start Docker containers
          ssh $EC2_USERNAME@$EC2_HOST "cd $APP_DIR && \
            # Create logs directory for volume mounting
            mkdir -p logs && \
            # Pull the latest changes and rebuild containers
            docker-compose down && \
            docker-compose up -d --build"

      - name: Verify Deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          ssh $EC2_USERNAME@$EC2_HOST "cd /home/$EC2_USERNAME/dozu-api && docker-compose ps"

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}-${{ github.sha }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## 🚀 API Service Release

            **Deployment**: EC2 Production
            **Environment**: Production
            **Host**: ${{ secrets.EC2_HOST }}
            **Commit**: ${{ github.sha }}
            **Date**: ${{ github.event.repository.updated_at || github.event.head_commit.timestamp }}

            ### Changes
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
