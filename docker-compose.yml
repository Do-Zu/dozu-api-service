version: '3.8'

services:
    api:
        container_name: dozu-api-service
        build:
            context: .
            dockerfile: Dockerfile
        restart: always
        ports:
            - '3444:3444'
        environment:
            - NODE_ENV=production
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_NAME=${POSTGRES_DB}
            - DB_USER=${POSTGRES_USER}
            - DB_PASS=${POSTGRES_PASSWORD}
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - dozu-app-network
        volumes:
            - api-logs:/app/logs
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3444/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 15s
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 500M

    dozu-embedding-service:
        container_name: dozu-embedding-service
        image: dozuu/dozu-embedding-service:latest
        restart: always
        ports:
            - '8686:8686'
        networks:
            - dozu-app-network

    whisper-service:
        container_name: whisper-service
        build:
            context: ./containers/whisper
            dockerfile: Dockerfile
        restart: always
        ports:
            - '8624:8624'
        networks:
            - dozu-app-network

    postgres:
        container_name: postgres-db
        image: postgres:17
        restart: always
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - PGDATA=/var/lib/postgresql/data/pgdata
        ports:
            - '5433:5432'
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ./init-scripts:/docker-entrypoint-initdb.d
        networks:
            - dozu-app-network
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    gotenberg:
        container_name: gotenberg
        image: gotenberg/gotenberg:8
        restart: always
        ports:
            - '3224:3000'
        networks:
            - dozu-app-network
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 15s

    redis:
        container_name: duzo-redis-memcache
        image: redis:8.4.0-alpine
        restart: always
        ports:
            - '6379:6379'
        networks:
            - dozu-app-network
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s
        deploy:
            resources:
                limits:
                    cpus: '0.50'
                    memory: 256M

networks:
    dozu-app-network:
        driver: bridge

volumes:
    postgres-data:
        driver: local
    api-logs:
        driver: local
